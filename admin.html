<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Shuttle Tracker & Admin - ระบบติดตามรถรับส่ง</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: { sans: ['Kanit', 'sans-serif'] },
              colors: {
                premium: {
                    dark: '#142850',
                    main: '#1a3673',
                    light: '#27498f'
                }
              }
            }
          }
        }
    </script>

    <style>
        body { 
            margin: 0; padding: 0; 
            overflow: hidden; 
            background-color: #f8fafc;
        }
        
        #map { height: 100vh; width: 100%; z-index: 1; position: absolute; top: 0; left: 0; }

        #mainPanel { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        #mainPanel.collapsed #panel-content { 
            max-height: 0; 
            padding-top: 0; 
            padding-bottom: 0; 
            opacity: 0; 
            overflow: hidden;
        }
        #panel-content {
            max-height: 600px; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
        }

        .toggle-icon { transition: transform 0.4s ease; }
        #mainPanel.collapsed .toggle-icon { transform: rotate(180deg); }

        .led-indicator { transition: all 0.3s ease; }
        .led-indicator.on { 
            background-color: #10b981;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
        }
        .led-indicator.off { 
            background-color: #94a3b8;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .leaflet-tooltip.station-label {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 20px;
            padding: 4px 10px;
            font-family: 'Kanit', sans-serif;
            font-size: 11px;
            font-weight: 500;
            color: #1e293b;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            white-space: nowrap;
        }
        .leaflet-tooltip-top:before, .leaflet-tooltip-bottom:before,
        .leaflet-tooltip-left:before, .leaflet-tooltip-right:before { display: none !important; }

        .leaflet-control-layers {
            border-radius: 16px !important;
            border: 1px solid rgba(255,255,255,0.8) !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05) !important;
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
        }
        .invisible-icon { background: transparent; border: none; }
    </style>
</head>
<body class="antialiased">

    <div id="map"></div>

    <div class="absolute top-4 left-1/2 -translate-x-1/2 w-[92%] max-w-md z-[1000] drop-shadow-2xl" id="mainPanel">
        <div class="bg-white/90 backdrop-blur-xl border border-white/60 rounded-3xl overflow-hidden shadow-xl shadow-blue-900/5">
            
            <div class="bg-gradient-to-r from-premium-dark via-premium-main to-premium-light p-5 cursor-pointer relative overflow-hidden flex justify-between items-center" onclick="togglePanel()">
                <div class="absolute -right-8 -top-8 w-32 h-32 bg-white/10 rounded-full blur-2xl pointer-events-none"></div>
                
                <div class="relative z-10 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-white/10 border border-white/20 flex items-center justify-center text-white backdrop-blur-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498l4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 00-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0z"/></svg>
                    </div>
                    <div>
                        <h3 class="text-white font-semibold text-lg leading-tight tracking-wide">แผนที่รถรับส่ง</h3>
                        <p class="text-blue-200/80 text-xs font-light mt-0.5">แตะเพื่อซ่อน/ขยายแผงควบคุม</p>
                    </div>
                </div>

                <div class="relative z-10 flex items-center gap-2">
                    <button onclick="event.stopPropagation(); toggleAdminModal();" class="bg-white/10 hover:bg-white/20 border border-white/20 px-3 py-2 rounded-xl text-white text-xs font-medium backdrop-blur-sm transition active:scale-95 flex items-center gap-1.5" title="จัดการระบบ">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 110-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38c-.551.318-1.26.117-1.527-.461a20.845 20.845 0 01-1.44-4.282m3.102.069a18.03 18.03 0 01-.59-4.59c0-1.586.205-3.124.59-4.59m0 9.18a23.848 23.848 0 018.835 2.535M10.34 6.66a23.847 23.847 0 008.835-2.535m0 0A23.74 23.74 0 0018.795 3m.38 1.125a23.91 23.91 0 011.014 5.395m-1.014-8.81c-2.28 1.093-4.686 1.894-7.185 2.399m-8.333-.002A23.868 23.868 0 004.5 5.25m0 0C2.923 5.438 1.42 5.766 0 6.223M4.5 5.25v2.86m0-2.86v-2.86m0 0c1.542-.456 3.14-.827 4.792-1.09m-4.792 1.09L3.5 4.5m1.002-.676c1.233-.356 2.502-.653 3.805-.884m-3.805.884c.594.137 1.18.293 1.76.468" /></svg>
                        <span class="hidden sm:inline">ตั้งค่า</span>
                    </button>
                    <svg class="toggle-icon w-5 h-5 text-blue-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>
                </div>
            </div>
            
            <div id="panel-content" class="px-5 pb-5 pt-4">
                <div class="grid grid-cols-2 gap-3 mb-5">
                    <button class="relative overflow-hidden group bg-white border border-slate-200 rounded-2xl p-3.5 text-left shadow-sm hover:shadow-md transition duration-200 active:scale-[0.98]" onclick="focusVan('van1')">
                        <div class="absolute inset-0 bg-gradient-to-br from-blue-50 to-transparent opacity-0 group-hover:opacity-100 transition duration-300"></div>
                        <div class="relative z-10 font-semibold text-slate-800 text-[0.9rem] flex items-center gap-1.5">🚍 รถคันที่ 1</div>
                        <div class="relative z-10 mt-2.5 inline-flex items-center gap-1.5 bg-slate-50 px-2.5 py-1 rounded-full text-[0.7rem] text-slate-500 border border-slate-100 font-medium">
                            <span class="w-2 h-2 rounded-full led-indicator off" id="led-van1"></span>
                            <span id="status-van1">รอสัญญาณ</span>
                        </div>
                    </button>

                    <button class="relative overflow-hidden group bg-white border border-slate-200 rounded-2xl p-3.5 text-left shadow-sm hover:shadow-md transition duration-200 active:scale-[0.98]" onclick="focusVan('van2')">
                        <div class="absolute inset-0 bg-gradient-to-br from-rose-50 to-transparent opacity-0 group-hover:opacity-100 transition duration-300"></div>
                        <div class="relative z-10 font-semibold text-slate-800 text-[0.9rem] flex items-center gap-1.5">🚍 รถคันที่ 2</div>
                        <div class="relative z-10 mt-2.5 inline-flex items-center gap-1.5 bg-slate-50 px-2.5 py-1 rounded-full text-[0.7rem] text-slate-500 border border-slate-100 font-medium">
                            <span class="w-2 h-2 rounded-full led-indicator off" id="led-van2"></span>
                            <span id="status-van2">รอสัญญาณ</span>
                        </div>
                    </button>
                </div>

                <div class="border-t border-slate-100 pt-4">
                    <h4 class="text-xs font-semibold text-slate-500 uppercase tracking-widest flex items-center gap-1.5 mb-3">
                        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12M8.25 17.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 17.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
                        ลำดับป้ายรถ (แตะเพื่อดู)
                    </h4>
                    <div class="max-h-[220px] overflow-y-auto pr-1 space-y-2 custom-scrollbar" id="stationOverviewList"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="hidden fixed inset-0 z-[1500] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 transition-all duration-300 opacity-0">
        <div class="bg-slate-50 w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-2xl shadow-2xl flex flex-col transform transition-all scale-95 duration-300" id="admin-container">
            <div class="bg-gradient-to-r from-premium-dark via-premium-main to-premium-light text-white p-6 sm:p-8 rounded-t-2xl flex flex-col sm:flex-row sm:items-center sm:justify-between gap-6 relative overflow-hidden flex-shrink-0">
                <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/5 rounded-full blur-2xl"></div>
                
                <div class="relative z-10">
                    <span class="text-xs font-semibold tracking-widest text-blue-200 uppercase bg-white/10 px-3 py-1 rounded-full backdrop-blur-sm">Management Console</span>
                    <h2 class="text-2xl font-semibold tracking-wide flex items-center gap-3 mt-2">
                        จัดการจุดจอดรถบัสรับส่ง
                    </h2>
                    <p class="text-sm text-blue-200/80 mt-1.5 font-light">คลิกที่ชื่อเพื่อแก้ไข | ลาก ☰ เพื่อสลับลำดับ | อัปเดตพิกัดแผนที่</p>
                </div>

                <div class="relative z-10 flex-shrink-0 flex gap-2.5">
                    <button onclick="addStation()" class="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition shadow-sm active:scale-95">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
                        เพิ่มจุดจอด
                    </button>
                    <button onclick="toggleAdminModal()" class="inline-flex items-center gap-2 bg-white/10 hover:bg-white/20 text-white border border-white/25 px-4 py-2.5 rounded-xl text-sm font-medium transition backdrop-blur-sm shadow-sm active:scale-95">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                        ปิดหน้าต่าง
                    </button>
                </div>
            </div>

            <div class="p-4 sm:p-8 flex-1 overflow-y-auto custom-scrollbar">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 overflow-hidden" id="station-list">
                    </div>
            </div>
        </div>
    </div>

    <div class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[2000] items-center justify-center p-4 transition-all duration-300 opacity-0" id="map-edit-modal">
        <div class="bg-white w-full max-w-xl rounded-2xl overflow-hidden shadow-2xl flex flex-col transform transition-all scale-95 duration-300" id="modal-container">
            <div class="px-6 py-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-base font-semibold text-slate-800 flex items-center gap-2.5" id="modal-title">
                    เปลี่ยนพิกัดจุดจอด
                </h3>
            </div>
            <div id="modal-map" class="h-[420px] w-full bg-slate-100"></div>
            <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-3">
                <button class="bg-white hover:bg-slate-100 text-slate-600 border border-slate-200 px-5 py-2.5 rounded-xl text-sm font-medium transition active:scale-95" onclick="closeMapModal()">ยกเลิก</button>
                <button class="bg-[#1a3673] hover:bg-[#142850] text-white px-5 py-2.5 rounded-xl text-sm font-medium transition shadow-lg shadow-blue-900/20 flex items-center gap-2 active:scale-95" onclick="saveLocation()">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
                    บันทึกพิกัดใหม่
                </button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <script>
        // 1. Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBL4nhltSeXZTtgShoqgvWG4tcyb92XOzw",
            authDomain: "my-apartment-shuttle.firebaseapp.com",
            databaseURL: "https://my-apartment-shuttle-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-apartment-shuttle",
            storageBucket: "my-apartment-shuttle.firebasestorage.app",
            messagingSenderId: "808566202899",
            appId: "1:808566202899:web:5626ae23c0df6335d455e6"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. State & Variables
        let currentStations = [];
        let stationLayers = [];
        let editMapInstance = null;
        let editMarker = null;
        let editingStationIndex = -1;

        // 3. Monitor: Map Setup
        const mapVoyager = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: 'OpenStreetMap' });
        const mapPositron = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: 'OpenStreetMap' });
        const mapDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: 'OpenStreetMap' });
        const mapSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' });

        const mainMap = L.map('map', { zoomControl: false, layers: [mapPositron] }).setView([13.801307, 100.311848], 15);

        const baseMaps = {
            "⚪ แผนที่มินิมอลขาว": mapPositron,
            "🎨 แผนที่สีสันเดิม": mapVoyager,
            "⚫ โหมดมืดสุดล้ำ": mapDark,
            "📸 ภาพถ่ายดาวเทียม": mapSatellite
        };

        L.control.layers(baseMaps, null, { position: 'bottomleft' }).addTo(mainMap);
        L.control.zoom({ position: 'bottomright' }).addTo(mainMap);

        // 4. Data Listener
        db.ref('stations').on('value', (snap) => {
            currentStations = snap.val() || [];
            updateMonitorUI();

            // เช็คว่าผู้ใช้ไม่ได้กำลังเปิดพิมพ์ชื่อช่อง Input ค้างไว้อยู่ ค่อยเรนเดอร์รายชื่อใหม่เพื่อไม่ให้เสียโฟกัส
            const activeElement = document.activeElement;
            const isEditingName = activeElement && activeElement.tagName === 'INPUT' && activeElement.type === 'text';
            if (!isEditingName) {
                renderAdminUI();
            }
        });

        // 5. Monitor Functions
        function togglePanel() {
            document.getElementById('mainPanel').classList.toggle('collapsed');
        }

        function updateMonitorUI() {
            stationLayers.forEach(layer => mainMap.removeLayer(layer));
            stationLayers = [];

            const listEl = document.getElementById('stationOverviewList');
            listEl.innerHTML = '';
            let orderIndex = 1;

            currentStations.forEach((s) => {
                if (!s || s.active === false) return;

                const invisibleIcon = L.divIcon({ className: 'invisible-icon', iconSize: [0, 0] });
                const marker = L.marker([s.lat, s.lng], { icon: invisibleIcon }).addTo(mainMap)
                 .bindTooltip(s.name, { permanent: true, direction: 'center', className: 'station-label' });
                stationLayers.push(marker);

                const item = document.createElement('div');
                item.className = 'group flex items-center justify-between gap-3 p-2.5 bg-slate-50 hover:bg-[#1a3673]/5 border border-slate-100 hover:border-[#1a3673]/20 rounded-xl cursor-pointer transition-all duration-200';
                item.onclick = () => {
                    mainMap.flyTo([s.lat, s.lng], 16.5, { duration: 1.2 });
                    if (window.innerWidth < 600) togglePanel();
                };

                const mandatoryTag = s.mandatory 
                    ? `<span class="text-[0.6rem] bg-rose-100 text-rose-600 px-2 py-0.5 rounded-md font-medium whitespace-nowrap">ห้ามข้าม</span>` 
                    : '';

                item.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="w-6 h-6 rounded-full bg-white text-slate-600 flex items-center justify-center text-xs font-semibold shadow-sm border border-slate-200 flex-shrink-0 group-hover:text-premium-main group-hover:border-premium-light transition-colors">${orderIndex}</div>
                        <div class="text-[0.85rem] text-slate-700 font-medium truncate group-hover:text-premium-dark transition-colors" title="${s.name}">${s.name}</div>
                    </div>
                    ${mandatoryTag}
                `;
                listEl.appendChild(item);
                orderIndex++;
            });
        }

        const iconBlue = L.icon({ iconUrl: 'https://cdn-icons-png.freepik.com/512/386/386405.png?ga=GA1.1.1656679989.1770308490', iconSize: [46, 46], iconAnchor: [23, 23] });
        const iconPink = L.icon({ iconUrl: 'https://cdn-icons-png.freepik.com/512/386/386456.png?ga=GA1.1.1656679989.1770308490', iconSize: [46, 46], iconAnchor: [23, 23] });

        const vans = {
            van1: { marker: null, icon: iconBlue, path: L.polyline([], {color: '#1a3673', weight: 4, dashArray: '5, 10', opacity: 0.8}).addTo(mainMap) },
            van2: { marker: null, icon: iconPink, path: L.polyline([], {color: '#e11d48', weight: 4, dashArray: '5, 10', opacity: 0.8}).addTo(mainMap) }
        };

        function focusVan(id) {
            if (vans[id].marker) {
                mainMap.flyTo(vans[id].marker.getLatLng(), 16.5, {duration: 1.2});
                document.getElementById('mainPanel').classList.add('collapsed');
            } else {
                alert("รถคันนี้ยังไม่ส่งสัญญาณเข้าสู่ระบบครับ");
            }
        }

        function trackShuttle(id) {
            db.ref('shuttles/' + id).on('value', (snap) => {
                const data = snap.val();
                const elStatus = document.getElementById(`status-${id}`);
                const elLed = document.getElementById(`led-${id}`);
                const v = vans[id];

                if (data && data.active) {
                    const pos = [data.lat, data.lng];
                    if (!v.marker) v.marker = L.marker(pos, {icon: v.icon}).addTo(mainMap).bindPopup(`<b style="font-family:'Kanit'; text-sm">อัปเดตล่าสุด: ${id === 'van1' ? 'รถคันที่ 1' : 'รถคันที่ 2'}</b>`);
                    else v.marker.setLatLng(pos);
                    v.path.addLatLng(pos);

                    elStatus.innerText = "กำลังวิ่ง";
                    elStatus.classList.replace('text-slate-500', 'text-emerald-600');
                    elLed.classList.replace('off', 'on');
                } else {
                    elStatus.innerText = "ออฟไลน์";
                    elStatus.classList.replace('text-emerald-600', 'text-slate-500');
                    elLed.classList.replace('on', 'off');
                }
            });
        }
        trackShuttle('van1');
        trackShuttle('van2');

        setInterval(() => {
            const m = new Date().getMinutes();
            if (m === 0 || m === 30) { vans.van1.path.setLatLngs([]); vans.van2.path.setLatLngs([]); }
        }, 60000);

        // ---------------------------------------------------------
        // 6. Admin & UI Management
        // ---------------------------------------------------------
        function toggleAdminModal() {
            const modal = document.getElementById('admin-modal');
            const container = document.getElementById('admin-container');
            
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    container.classList.remove('scale-95');
                    container.classList.add('scale-100');
                }, 10);
            } else {
                modal.classList.add('opacity-0');
                container.classList.remove('scale-100');
                container.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.remove('flex');
                    modal.classList.add('hidden');
                }, 300);
            }
        }

        // ฟังก์ชันสำหรับเพิ่มจุดจอดใหม่
        window.addStation = function() {
            if (!confirm('คุณต้องการเพิ่มจุดจอดใหม่ใช่หรือไม่?')) return;

            const nextIndex = currentStations.length;
            let baseLat = 13.801307;
            let baseLng = 100.311848;

            // ถ้ามีข้อมูลเดิมอยู่แล้ว ให้เอาพิกัดล่าสุดมาเยื้องออกเล็กน้อยเพื่อไม่ให้จุดจอดซ้อนกันมิด
            if (nextIndex > 0 && currentStations[nextIndex - 1]) {
                baseLat = currentStations[nextIndex - 1].lat + 0.0006;
                baseLng = currentStations[nextIndex - 1].lng + 0.0006;
            }

            const newStation = {
                id: nextIndex,
                name: `จุดจอดใหม่ที่ ${nextIndex + 1}`,
                lat: baseLat,
                lng: baseLng,
                active: true,
                mandatory: false
            };

            db.ref(`stations/${nextIndex}`).set(newStation).catch(err => {
                alert('ไม่สามารถเพิ่มจุดจอดได้: ' + err.message);
            });
        };

        // ฟังก์ชันสำหรับลบจุดจอด
        window.deleteStation = function(index) {
            const stationName = currentStations[index] ? currentStations[index].name : 'จุดจอดนี้';
            
            if (confirm(`คุณแน่ใจหรือไม่ว่าต้องการลบจุดจอด "${stationName}"?`)) {
                // คัดลอกข้อมูลอาเรย์เดิมออกมากรองจุดที่ต้องการลบออก
                let newStationsOrder = [...currentStations];
                newStationsOrder.splice(index, 1);
                
                // จัดโครงสร้าง id ใหม่ให้เรียง 0, 1, 2, 3... ตามปกติเพื่อป้องกันข้อมูลแหว่ง
                newStationsOrder = newStationsOrder.map((station, i) => {
                    return { ...station, id: i };
                });
                
                // อัปเดตข้อมูลชุดใหม่ขึ้น Firebase เเทนที่ทั้งหมด
                db.ref('stations').set(newStationsOrder).then(() => {
                    alert('ลบจุดจอดเสร็จสิ้น');
                }).catch(err => {
                    alert('เกิดข้อผิดพลาด: ' + err.message);
                });
            }
        };

        function renderAdminUI() {
            const rootListEl = document.getElementById('station-list');
            rootListEl.innerHTML = '';

            if (currentStations.length === 0) {
                rootListEl.innerHTML = '<div class="p-8 text-center text-slate-400 text-sm">ยังไม่มีข้อมูลจุดจอด กดปุ่มเพิ่มจุดจอดได้ที่มุมขวาบน</div>';
                return;
            }

            // ---------------------------------------------------
            // ชิ้นส่วนที่ 1: เรนเดอร์จุดแรก (Index 0) - บังคับล็อกห้ามเลื่อน/ห้ามปิด/ห้ามลบ
            // ---------------------------------------------------
            const firstStation = currentStations[0];
            if (firstStation) {
                const fixedDiv = document.createElement('div');
                fixedDiv.className = 'flex flex-col md:flex-row md:items-center justify-between p-5 bg-slate-100/80 border-b border-slate-200 gap-4 select-none';
                fixedDiv.innerHTML = `
                    <div class="flex items-center gap-4 flex-1 min-w-[260px]">
                        <span class="p-2 text-slate-400 bg-slate-200/60 rounded-xl cursor-not-allowed text-xs" title="จุดแรกถูกล็อกตำแหน่งและสถานะไว้เป็นจุดเริ่มต้น">
                            🔒 ล็อก
                        </span>
                        
                        <div class="flex items-center gap-3 flex-1">
                            <div class="relative w-full max-w-[280px]">
                                <input type="text" 
                                       value="${firstStation.name}" 
                                       onchange="updateStation(0, 'name', this.value)" 
                                       class="w-full bg-transparent border border-transparent hover:border-slate-300 focus:border-[#1a3673]/50 focus:bg-white focus:ring-4 focus:ring-[#1a3673]/10 focus:outline-none px-2.5 py-1.5 rounded-lg transition-all text-sm sm:text-base text-slate-800 font-semibold"
                                       title="คลิกเพื่อพิมพ์เปลี่ยนชื่อจุดเริ่มต้น">
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-6 text-xs sm:text-sm justify-between md:justify-end flex-wrap mt-2 md:mt-0">
                        
                        <label class="relative inline-flex items-center cursor-pointer group">
                            <input type="checkbox" onchange="updateStation(0, 'mandatory', this.checked)" ${firstStation.mandatory ? 'checked' : ''} class="sr-only peer">
                            <div class="w-10 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-rose-500 transition duration-200 after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                            <span class="ms-2.5 text-xs font-medium text-slate-500 group-hover:text-rose-600 transition">ห้ามข้าม</span>
                        </label>
                        
                        <button class="inline-flex items-center gap-1.5 bg-white hover:bg-slate-50 active:bg-slate-100 text-slate-700 font-medium px-3.5 py-2 rounded-xl border border-slate-200 shadow-sm text-xs transition duration-200" onclick="openMapModal(0)">
                            <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
                            พิกัด
                        </button>
                    </div>
                `;
                rootListEl.appendChild(fixedDiv);
            }

            // ---------------------------------------------------
            // ชิ้นส่วนที่ 2: สร้าง Container เปล่าสำหรับกลุ่มจุดที่ลากได้เเละลบได้ (Index 1 เป็นต้นไป)
            // ---------------------------------------------------
            const sortableContainer = document.createElement('div');
            sortableContainer.id = 'sortable-container';
            sortableContainer.className = 'divide-y divide-slate-100';
            rootListEl.appendChild(sortableContainer);

            // วนลูปเรนเดอร์จุดย่อยตั้งแต่ดัชนีที่ 1
            for (let index = 1; index < currentStations.length; index++) {
                const station = currentStations[index];
                if (!station) continue;

                const div = document.createElement('div');
                div.className = 'flex flex-col md:flex-row md:items-center justify-between p-5 hover:bg-slate-50/60 transition duration-200 gap-4';
                div.setAttribute('data-original-index', index); // เก็บตำแหน่งจริงบน DB ไว้ใช้อ้างอิงตอนจัดลำดับใหม่

                const inputStyle = station.active 
                    ? 'text-slate-800 font-medium' 
                    : 'text-slate-400 opacity-60 font-normal line-through';

                div.innerHTML = `
                    <div class="flex items-center gap-4 flex-1 min-w-[260px]">
                        <span class="drag-handle p-2 text-slate-300 hover:text-slate-500 rounded-xl hover:bg-slate-100 cursor-grab active:cursor-grabbing transition duration-200">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M7 2a1 1 0 11.001 2.001A1 1 0 017 2zm0 6a1 1 0 11.001 2.001A1 1 0 017 8zm0 6a1 1 0 11.001 2.001A1 1 0 017 14zm6-12a1 1 0 11.001 2.001A1 1 0 0113 2zm0 6a1 1 0 11.001 2.001A1 1 0 0113 8zm0 6a1 1 0 11.001 2.001A1 1 0 0113 14z"/></svg>
                        </span>
                        
                        <div class="flex items-center gap-3 flex-1 group">
                            <div class="relative w-full max-w-[280px]">
                                <input type="text" 
                                       value="${station.name}" 
                                       onchange="updateStation(${index}, 'name', this.value)" 
                                       class="w-full bg-transparent border border-transparent hover:border-slate-300 focus:border-[#1a3673]/50 focus:bg-white focus:ring-4 focus:ring-[#1a3673]/10 focus:outline-none px-2.5 py-1.5 rounded-lg transition-all text-sm sm:text-base ${inputStyle}"
                                       placeholder="ตั้งชื่อจุดจอด...">
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-4 text-xs sm:text-sm justify-between md:justify-end flex-wrap mt-2 md:mt-0">
                        
                        <label class="relative inline-flex items-center cursor-pointer select-none group">
                            <input type="checkbox" onchange="updateStation(${index}, 'mandatory', this.checked)" ${station.mandatory ? 'checked' : ''} class="sr-only peer">
                            <div class="w-10 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-rose-500 transition duration-200 after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                            <span class="ms-2.5 text-xs font-medium text-slate-500 group-hover:text-rose-600 transition">ห้ามข้าม</span>
                        </label>
                        
                        <button class="inline-flex items-center gap-1.5 bg-white hover:bg-slate-50 active:bg-slate-100 text-slate-700 font-medium px-3.5 py-2 rounded-xl border border-slate-200 shadow-sm text-xs transition duration-200" onclick="openMapModal(${index})">
                            <svg class="w-3.5 h-3.5 text-slate-400 font-bold" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
                            พิกัด
                        </button>

                        <button class="inline-flex items-center gap-1.5 bg-rose-50 hover:bg-rose-100 active:bg-rose-200 text-rose-600 font-medium px-3.5 py-2 rounded-xl border border-rose-200 shadow-sm text-xs transition duration-200" onclick="deleteStation(${index})">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            ลบ
                        </button>
                    </div>
                `;
                sortableContainer.appendChild(div);
            }

            // ผูกระบบลากสลับตำแหน่งเฉพาะบน Container จุดย่อยเท่านั้น (จะไม่กระทบจุดแรก)
            new Sortable(sortableContainer, {
                handle: '.drag-handle',
                animation: 250,
                ghostClass: 'bg-slate-50',
                chosenClass: 'shadow-md',
                onEnd: function () {
                    if (!confirm('คุณต้องการบันทึกการจัดเรียงลำดับป้ายจุดจอดใหม่นี้ใช่หรือไม่?')) {
                        renderAdminUI(); // ยกเลิกการเปลี่ยนรูปหน้าจอ ย้อนกลับค่าเดิม
                        return;
                    }

                    const htmlItems = Array.from(sortableContainer.children);
                    
                    // บังคับกำหนดค่าอาเรย์ใหม่ ให้สมาชิกตัวแรกสุดเป็นของ Index 0 เสมอไม่มีการเปลี่ยนแปลง
                    const newStationsOrder = [ { ...currentStations[0], id: 0 } ];
                    
                    // นำสมาชิกที่เหลือมาต่อท้ายตามลำดับใหม่จากการลาก
                    htmlItems.forEach((item, newSortIndex) => {
                        const oldIdx = parseInt(item.getAttribute('data-original-index'));
                        let stationData = { ...currentStations[oldIdx] };
                        stationData.id = newSortIndex + 1; // ลำดับใหม่เริ่มที่ 1, 2, 3...
                        newStationsOrder.push(stationData);
                    });
                    
                    // อัปเดตโครงสร้างลำดับไปยัง Firebase
                    db.ref('stations').set(newStationsOrder);
                }
            });
        }

        window.updateStation = function(index, field, value) {
            let fieldLabel = field === 'name' ? 'ชื่อจุดจอดใหม่' : 'สถานะ ห้ามข้าม';
            let valueLabel = typeof value === 'boolean' ? (value ? 'เปิดใช้งาน' : 'ปิดใช้งาน') : value;

            if (confirm(`ยืนยันการเปลี่ยน ${fieldLabel} ให้เป็น "${valueLabel}" หรือไม่?`)) {
                db.ref(`stations/${index}`).update({ [field]: value });
            } else {
                renderAdminUI(); // โหลด UI หน้าจอใหม่เพื่อยกเลิกการแก้ไขและแสดงผลค่าเดิมจาก Firebase
            }
        };

        // ---------------------------------------------------------
        // 7. Map Modal Management (สำหรับเปลี่ยนพิกัดป้าย)
        // ---------------------------------------------------------
        window.openMapModal = function(index) {
            editingStationIndex = index;
            const station = currentStations[index];
            
            document.getElementById('modal-title').innerHTML = `
                <svg class="w-5 h-5 text-[#1a3673]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
                ปรับเปลี่ยนพิกัด: <span class="font-semibold text-slate-800">${station.name}</span>
            `;
            
            const modal = document.getElementById('map-edit-modal');
            const container = document.getElementById('modal-container');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                container.classList.remove('scale-95');
                container.classList.add('scale-100');
            }, 10);

            if (!editMapInstance) {
                editMapInstance = L.map('modal-map').setView([station.lat, station.lng], 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(editMapInstance);
                
                editMarker = L.marker([station.lat, station.lng], { draggable: true }).addTo(editMapInstance);
                editMarker.bindPopup("<b class='font-sans text-xs'>ลากหมุดนี้เพื่อย้ายพิกัดป้าย</b>").openPopup();
            } else {
                editMapInstance.setView([station.lat, station.lng], 16);
                editMarker.setLatLng([station.lat, station.lng]);
            }

            setTimeout(() => {
                editMapInstance.invalidateSize();
            }, 250);
        };

        window.closeMapModal = function() {
            const modal = document.getElementById('map-edit-modal');
            const container = document.getElementById('modal-container');
            
            modal.classList.add('opacity-0');
            container.classList.remove('scale-100');
            container.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
            }, 300);
        };

        window.saveLocation = function() {
            if (editingStationIndex === -1) return;
            
            const newPos = editMarker.getLatLng();
            if (confirm('คุณต้องการบันทึกพิกัดตำแหน่งทางภูมิศาสตร์ใหม่นี้ใช่หรือไม่?')) {
                db.ref(`stations/${editingStationIndex}`).update({ 
                    lat: newPos.lat, 
                    lng: newPos.lng 
                }).then(() => {
                    closeMapModal();
                }).catch(err => {
                    alert('เกิดข้อผิดพลาด: ' + err.message);
                });
            }
        };
    </script>
</body>
</html>
